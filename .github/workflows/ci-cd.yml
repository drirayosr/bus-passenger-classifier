name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-core.txt
        pip install -r requirements-test.txt
    
    - name: Run data validation tests
      run: |
        pytest tests/test_data_validation.py -v --tb=short
    
    - name: Generate test coverage report
      run: |
        pytest tests/ --cov=src --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort pylint
    
    - name: Run flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with black
      run: |
        black --check src/ tests/
    
    - name: Check import sorting with isort
      run: |
        isort --check-only src/ tests/

  build-api:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    - name: Build and test Docker image
      run: |
        docker build -t bus-passenger-api:test -f api/Dockerfile .
    
    - name: Push Docker image
      run: |
        docker tag bus-passenger-api:test ${{ secrets.DOCKER_USERNAME }}/bus-passenger-api:latest
        docker tag bus-passenger-api:test ${{ secrets.DOCKER_USERNAME }}/bus-passenger-api:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/bus-passenger-api:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/bus-passenger-api:${{ github.sha }}
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

  train-model:
    name: Train and Register Model
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-core.txt
        pip install -r requirements-mlflow.txt
    
    - name: Setup DVC
      run: |
        pip install dvc
        dvc pull
      env:
        DVC_REMOTE_URL: ${{ secrets.DVC_REMOTE_URL }}
    
    - name: Train model
      run: |
        python src/train_mlflow.py
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
    
    - name: Register model to MLflow
      run: |
        python scripts/register_model.py
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-api, train-model]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy to Cloud Run (Example)
      run: |
        echo "Deploying to production..."
        # Add your deployment commands here
        # Examples:
        # - gcloud run deploy
        # - aws ecs update-service
        # - kubectl apply -f deployment.yaml
